<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONQUEST — Territory War</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;color:#e8e0d0;font-family:'JetBrains Mono',monospace}

/* LOBBY */
#lobby{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#1a1520,#0a0a0f 70%)}
.lobby-box{text-align:center;max-width:560px;width:92%;padding:36px;border:1px solid rgba(212,175,55,.2);background:rgba(15,12,20,.92);box-shadow:0 0 80px rgba(212,175,55,.05)}
.lobby-box h1{font-family:'Cinzel',serif;font-size:44px;font-weight:900;background:linear-gradient(135deg,#d4af37,#f0d060,#d4af37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:6px}
.lobby-box .sub{color:#8a7a60;font-size:10px;letter-spacing:5px;margin-bottom:28px}
.lr{display:flex;gap:10px;margin-bottom:12px;align-items:center;justify-content:center}
.lr label{font-size:11px;color:#a09080;min-width:90px;text-align:right;letter-spacing:1px}
.lr select,.lr input[type=text]{background:#1a1520;border:1px solid #3a3040;color:#e8e0d0;padding:7px 12px;font-family:inherit;font-size:12px;outline:none;width:180px}
.lr select:focus,.lr input:focus{border-color:#d4af37}
.colors{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:8px 0 16px}
.csw{width:26px;height:26px;border:2px solid transparent;cursor:pointer;transition:.2s}
.csw:hover{transform:scale(1.15)}.csw.sel{border-color:#fff;transform:scale(1.2)}
.btn{display:inline-block;padding:14px 44px;margin:6px;font-family:'Cinzel',serif;font-size:14px;font-weight:700;letter-spacing:3px;border:1px solid #d4af37;background:0 0;color:#d4af37;cursor:pointer;transition:.3s}
.btn:hover{background:#d4af37;color:#0a0a0f}
.btn-mode{padding:18px 36px;margin:8px;font-size:13px;min-width:160px}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:100;display:none;justify-content:space-between;padding:8px 14px;pointer-events:none}
.hp{pointer-events:auto;background:rgba(10,10,15,.88);border:1px solid rgba(212,175,55,.15);padding:7px 12px;font-size:11px;backdrop-filter:blur(4px)}
.hp .v{color:#d4af37;font-weight:700}.hp .l{color:#8a7a60;font-size:9px;letter-spacing:1px}

/* MINIMAP */
#mm-wrap{position:fixed;bottom:10px;right:10px;z-index:100;border:1px solid rgba(212,175,55,.3);background:rgba(10,10,15,.8);display:none}

/* LEADERBOARD */
#lb{position:fixed;left:10px;top:50%;transform:translateY(-50%);z-index:100;background:rgba(10,10,15,.9);border:1px solid rgba(212,175,55,.15);padding:10px;width:155px;font-size:10px;display:none;backdrop-filter:blur(4px)}
#lb h4{font-family:'Cinzel',serif;font-size:11px;color:#d4af37;letter-spacing:2px;margin-bottom:6px;text-align:center}
.lbr{display:flex;justify-content:space-between;padding:2px 3px;border-bottom:1px solid #1a1520}
.lbr .n{max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.lbr .c{color:#d4af37}

/* SHOP */
#shop{position:fixed;right:10px;top:50%;transform:translateY(-50%);z-index:100;background:rgba(10,10,15,.92);border:1px solid rgba(212,175,55,.2);padding:12px;width:210px;display:none;backdrop-filter:blur(4px)}
#shop h3{font-family:'Cinzel',serif;font-size:12px;color:#d4af37;text-align:center;margin-bottom:8px;letter-spacing:2px}
.si{padding:7px;margin-bottom:5px;border:1px solid #2a2030;cursor:pointer;font-size:10px;transition:.2s}
.si:hover{border-color:#d4af37;background:rgba(212,175,55,.05)}
.si.owned{border-color:#4a6;opacity:.6;cursor:default}
.si .sn{font-weight:700;color:#e8e0d0}.si .sc{color:#d4af37}.si .sd{color:#7a7060;font-size:9px;margin-top:2px}

/* ACTION BAR */
#abar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:100;display:none;gap:6px;background:rgba(10,10,15,.88);border:1px solid rgba(212,175,55,.15);padding:7px 12px;backdrop-filter:blur(4px)}
.ab{padding:5px 12px;font-family:inherit;font-size:10px;letter-spacing:1px;background:0 0;border:1px solid #3a3040;color:#a09080;cursor:pointer;transition:.2s}
.ab:hover,.ab.on{border-color:#d4af37;color:#d4af37}

/* CAPTURE BAR */
#capbar{position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);z-index:100;width:220px;height:22px;border:1px solid #d4af37;display:none;background:rgba(10,10,15,.9)}
#capfill{height:100%;width:0;background:linear-gradient(90deg,#d4af37,#f0d060);transition:width .1s}
#captxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;letter-spacing:1px}

/* TROOP INPUT */
#tinput{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);z-index:100;display:none;background:rgba(10,10,15,.92);border:1px solid rgba(212,175,55,.2);padding:8px 14px;text-align:center;backdrop-filter:blur(4px)}
#tinput .tt{font-size:9px;color:#8a7a60;letter-spacing:1px;margin-bottom:4px}
#tinput input{width:90px;background:#1a1520;border:1px solid #3a3040;color:#d4af37;padding:4px 8px;font-family:inherit;font-size:13px;text-align:center;outline:none}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(10,10,15,.95);border:1px solid #d4af37;padding:8px 20px;font-size:11px;color:#d4af37;letter-spacing:1px;pointer-events:none;animation:tIn .3s,tOut .3s 2.5s forwards}
@keyframes tIn{from{opacity:0;transform:translate(-50%,-16px)}}
@keyframes tOut{to{opacity:0;transform:translate(-50%,-16px)}}

/* GAME OVER */
#gameover{position:fixed;inset:0;z-index:2000;display:none;align-items:center;justify-content:center;background:rgba(5,5,10,.92)}
.go-box{text-align:center;padding:40px}
.go-box h1{font-family:'Cinzel',serif;font-size:48px;color:#d4af37;letter-spacing:6px}
.go-box p{color:#a09080;margin:16px 0 24px;font-size:13px}

canvas#gc{display:block;cursor:crosshair}

/* SCREEN TRANSITIONS */
.screen{display:none}.screen.active{display:block}
.mode-desc{color:#8a7a60;font-size:10px;letter-spacing:1px;margin-top:4px}
</style>
</head>
<body>

</div>

<canvas id="gc"></canvas>

<div id="hud">
  <div class="hp">
    <span class="l">GOLD </span><span class="v" id="hgold">0</span>&nbsp;&nbsp;
    <span class="l">TROOPS </span><span class="v" id="htroops">0</span>&nbsp;&nbsp;

</div>

<div id="mm-wrap"><canvas id="mm" width="160" height="160"></canvas></div>

<div id="lb"><h4>RANKS</h4><div id="lbl"></div></div>

<div id="shop">
  <h3>UPGRADES</h3>

</div>

<div id="abar">
  <button class="ab" data-a="deploy">DEPLOY [1]</button>

</div>

<div id="tinput">
  <div class="tt">TROOPS TO SEND (set high to send all)</div>

<div id="capbar"><div id="capfill"></div><div id="captxt">HOLD U — CAPTURE</div></div>

<div id="gameover"><div class="go-box"><h1 id="gotext">VICTORY</h1><p id="gosub"></p><button class="btn" onclick="location.reload()">PLAY AGAIN</button></div></div>

<script>
// ================================================================

// ================================================================

// Firebase init
firebase.initializeApp({apiKey:"AIzaSyASPNSXdFs2B3X8mbUq-nBYlgAIR7BSx6E",authDomain:"fortuna-64c00.firebaseapp.com",databaseURL:"https://fortuna-64c00-default-rtdb.firebaseio.com",projectId:"fortuna-64c00",storageBucket:"fortuna-64c00.firebasestorage.app",messagingSenderId:"329218105683",appId:"1:329218105683:web:6b16fd2b1091531e4481a6"});
const fbDb=firebase.database();
const ONLINE_ROOM='conquest_war';
let fbMyId=null, fbRef=null, onlinePlayers={}, isOnline=false;

const PCOLORS=['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#264653','#6a4c93','#1982c4','#8ac926','#ff595e','#ffca3a','#8338ec','#ff006e','#3a86ff','#fb5607','#06d6a0'];
const TIER_NAME=['Militia','Roman Soldiers','Gladiators','Best Knights'];
const TIER_POWER=[1,2.5,5,10];
const BASE_GOLD=20, BASE_TROOP=1, CAP_TIME=10;

// Upgrade definitions: 10 levels each + nuke purchase
const UPGRADES={
  gold:{
    name:'Gold Income',
    levels:[
      {name:'+10 Gold/s', cost:500, add:10},

      {name:'+5 Troops/s', cost:9000, add:5},
      {name:'+8 Troops/s', cost:18000, add:8},
      {name:'+12 Troops/s', cost:35000, add:12},
      {name:'+18 Troops/s', cost:70000, add:18},
      {name:'+25 Troops/s', cost:130000, add:25},
      {name:'+35 Troops/s', cost:250000, add:35},

      {name:'×15 Power', cost:200000, mult:15},
      {name:'×22 Power', cost:400000, mult:22},
      {name:'×35 Power', cost:800000, mult:35},

    ]
  },
  nuke:{

    levels:[
      {name:'1 Nuke', cost:50000, add:1},
      {name:'1 Nuke', cost:50000, add:1},
      {name:'1 Nuke', cost:75000, add:1},
      {name:'1 Nuke', cost:75000, add:1},
      {name:'1 Nuke', cost:100000, add:1},
      {name:'1 Nuke', cost:100000, add:1},
      {name:'1 Nuke', cost:150000, add:1},
      {name:'1 Nuke', cost:150000, add:1},
      {name:'1 Nuke', cost:200000, add:1},
      {name:'1 Nuke', cost:200000, add:1},
    ]
  }
};
const CELL=80;
let W,H,canvas,ctx,mmCanvas,mmCtx;
let G={grid:null,players:[],size:12,cellSize:CELL};
let me=null, meIdx=0;
let cam={x:0,y:0}, keys={}, action=null, selTerr=null, selTerr2=null;
let capProg=0, capTarget=null, shopOpen=false, gameOn=false, lastT=0;
let particles=[], floatingTexts=[];
let currentMode='bots'; // 'bots' or 'online'

// ---- LOBBY SCREENS ----
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Color picker setup for both screens
let selColorOnline=0, selColorBots=0;
function setupColorPicker(containerId, getSet){
  const el=document.getElementById(containerId);
  PCOLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='csw'+(i===0?' sel':'');
    d.style.background=c;
    d.onclick=()=>{
      el.querySelectorAll('.csw').forEach(s=>s.classList.remove('sel'));
      d.classList.add('sel');
      getSet(i);
    };
    el.appendChild(d);
  });
}
setupColorPicker('cpick-online', v=>{ selColorOnline=v; });
setupColorPicker('cpick-bots', v=>{ selColorBots=v; });

// Mode selection buttons
document.getElementById('btn-online').onclick=()=>{ currentMode='online'; showScreen('screen-online'); };
document.getElementById('btn-bots').onclick=()=>{ currentMode='bots'; showScreen('screen-bots'); };
document.getElementById('back-online').onclick=()=>showScreen('screen-mode');
document.getElementById('back-bots').onclick=()=>showScreen('screen-mode');

// Start buttons
document.getElementById('start-online').onclick=()=>startOnline();
document.getElementById('start-bots').onclick=()=>startBots();

async function startOnline(){
  const name=document.getElementById('pname-online').value.trim()||'Commander';
  const myColor=PCOLORS[selColorOnline];
  isOnline=true;
  currentMode='online';
  
  // Fixed 16x16 grid for online
  G.size=16;
  initGrid(16);
  
  // Create Firebase player ID
  fbMyId='p_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
  fbRef=fbDb.ref(ONLINE_ROOM);
  
  // Pick a random spawn
  const margin=1;
  const spR=margin+Math.floor(Math.random()*(G.size-2*margin));
  const spC=margin+Math.floor(Math.random()*(G.size-2*margin));
  
  // Register ourselves in Firebase
  const myRef=fbRef.child('players/'+fbMyId);
  myRef.set({
    name:name, color:myColor,
    gold:0, troops:5, powerMult:1,
    goldRate:BASE_GOLD, troopRate:BASE_TROOP,
    alive:true, spawnR:spR, spawnC:spC,
    upgradeLv:{gold:0,troops:0,power:0,nuke:0},nukes:0,
    t:Date.now()
  });
  myRef.onDisconnect().remove();
  
  // Clean up ALL stale grid data before starting
  // First remove everything not owned by currently active players
  const gridSnap=await fbRef.child('grid').once('value');
  const oldGrid=gridSnap.val()||{};
  const playersSnap=await fbRef.child('players').once('value');
  const activePlayers=playersSnap.val()||{};
  const activeIds=new Set(Object.keys(activePlayers));
  const cleanups={};
  for(const key in oldGrid){
    const owner=oldGrid[key].owner;
    // Remove if no owner, or owner is not currently active
    if(!owner || !activeIds.has(owner)){
      cleanups['grid/'+key]=null;
    }
  }
  if(Object.keys(cleanups).length>0){
    await fbRef.update(cleanups);
  }
  
  // Also wipe our own old grid cells from Firebase (in case we had a previous session)
  // Only keep the one spawn tile
  const gridSnap2=await fbRef.child('grid').once('value');
  const currentGrid=gridSnap2.val()||{};
  const myCleanups={};
  for(const key in currentGrid){
    if(currentGrid[key].owner===fbMyId){
      myCleanups['grid/'+key]=null;
    }
  }
  if(Object.keys(myCleanups).length>0){
    await fbRef.update(myCleanups);
  }
  
  // Now also reset local grid to be totally clean
  initGrid(G.size);
  
  // Load current active grid from Firebase into local
  const freshGrid=await fbRef.child('grid').once('value');
  const freshData=freshGrid.val()||{};
  for(const key in freshData){
    const [r,c]=key.split('_').map(Number);
    if(r>=0&&r<G.size&&c>=0&&c<G.size){
      const gd=freshData[key];
      if(gd.owner && gd.owner!==fbMyId){
        G.grid[r][c].owner=-2;
        G.grid[r][c].troops=gd.troops||0;
      }
    }
  }
  
  // Set ONLY our 1 spawn tile
  fbRef.child('grid/'+spR+'_'+spC).set({owner:fbMyId, troops:3});
  
  // Init local player
  G.players=[];
  meIdx=0;
  G.players.push({
    id:0, fbId:fbMyId, name:name, color:myColor,
    gold:0, troops:5, powerMult:1,
    goldRate:BASE_GOLD, troopRate:BASE_TROOP,
    isBot:false, alive:true,
    spawnR:spR, spawnC:spC,
    botTimer:0, botAction:null,
    upgradeLv:{gold:0,troops:0,power:0,nuke:0},nukes:0
  });
  G.grid[spR][spC].owner=0;
  G.grid[spR][spC].troops=3;
  me=G.players[0];
  
  // Listen for other players joining/leaving
  fbRef.child('players').on('value', snap=>{
    const all=snap.val()||{};
    onlinePlayers=all;
    const now=Date.now();
    
    // Rebuild player list from Firebase (keep local player as idx 0)
    // Add remote players as additional entries
    const remoteIds=Object.keys(all).filter(id=>id!==fbMyId && now-all[id].t<15000);
    
    // Remove stale remote players from G.players
    G.players=G.players.filter(p=>p.id===0 || remoteIds.some(rid=>p.fbId===rid));
    
    // Add new remote players
    for(const rid of remoteIds){
      if(!G.players.some(p=>p.fbId===rid)){
        const rp=all[rid];
        const newIdx=G.players.length;
        G.players.push({
          id:newIdx, fbId:rid, name:rp.name, color:rp.color,
          gold:rp.gold||0, troops:rp.troops||0, powerMult:rp.powerMult||1,
          goldRate:rp.goldRate||BASE_GOLD, troopRate:rp.troopRate||BASE_TROOP,
          isBot:false, alive:rp.alive!==false,
          spawnR:rp.spawnR, spawnC:rp.spawnC,
          botTimer:0, botAction:null,
          upgradeLv:rp.upgradeLv||{gold:0,troops:0,power:0}
        });
      }
    }
    
    document.getElementById('lstatus').textContent='Online — '+Object.keys(all).length+' players';
  });
  
  // Listen for grid changes from other players
  fbRef.child('grid').on('value', snap=>{
    const gridData=snap.val()||{};
    for(const key in gridData){
      const [r,c]=key.split('_').map(Number);
      if(r>=0&&r<G.size&&c>=0&&c<G.size){
        const gd=gridData[key];
        // Skip our own tiles — local state is always authoritative
        if(gd.owner===fbMyId) continue;
        // Find local player idx for this Firebase owner
        const ownerPlayer=G.players.find(p=>p.fbId===gd.owner);
        if(ownerPlayer){
          G.grid[r][c].owner=ownerPlayer.id;
          G.grid[r][c].troops=gd.troops||0;
        } else if(gd.owner){
          G.grid[r][c].owner=-2;
          G.grid[r][c].troops=gd.troops||0;
        }
      }
    }
  });
  
  // Sync our state periodically
  setInterval(()=>{
    if(!isOnline||!me)return;
    myRef.update({
      gold:Math.floor(me.gold), troops:Math.floor(me.troops),
      powerMult:me.powerMult, goldRate:me.goldRate, troopRate:me.troopRate,
      alive:me.alive, upgradeLv:me.upgradeLv, t:Date.now()
    });
    // Sync our owned grid cells
    for(let r=0;r<G.size;r++)for(let c=0;c<G.size;c++){
      if(G.grid[r][c].owner===meIdx){
        fbRef.child('grid/'+r+'_'+c).set({owner:fbMyId, troops:Math.floor(G.grid[r][c].troops)});
      }
    }
  },1000);
  
  // Cleanup stale players
  setInterval(()=>{
    if(!isOnline)return;
    const now=Date.now();
    Object.entries(onlinePlayers).forEach(([id,p])=>{
      if(id!==fbMyId && now-p.t>15000){
        fbRef.child('players/'+id).remove();
        // Remove their grid cells
        fbRef.child('grid').once('value',snap=>{
          const gd=snap.val()||{};
          for(const key in gd){
            if(gd[key].owner===id) fbRef.child('grid/'+key).remove();
          }
        });
      }
    });
  },5000);
  
  launchGame();
}

// ---- GRID ----
function initGrid(size){
  G.grid=[];
  for(let r=0;r<size;r++){
    G.grid[r]=[];
    for(let c=0;c<size;c++){
      G.grid[r][c]={row:r,col:c,owner:-1,troops:0,flagHP:0};
    }
  }
}

// ---- PLAYERS ----
function initPlayers(np, myName, myColorIdx){
  G.players=[];
  const spawns=getSpawnPositions(np,G.size);
  for(let i=0;i<np;i++){
    const isMe=i===0;
    const sp=spawns[i];
    G.players.push({
      id:i, name:isMe?myName:botName(i), color:PCOLORS[(myColorIdx+i)%16],
      gold:0, troops:5, powerMult:1,
      goldRate:BASE_GOLD, troopRate:BASE_TROOP,
      isBot:!isMe, alive:true,
      spawnR:sp[0], spawnC:sp[1],
      botTimer:0, botAction:null,
      upgradeLv:{gold:0,troops:0,power:0,nuke:0},nukes:0
    });
    G.grid[sp[0]][sp[1]].owner=i;
    G.grid[sp[0]][sp[1]].troops=3;
  }
  me=G.players[0];
  meIdx=0;
}

function botName(i){
  const names=['Caesar','Brutus','Nero','Augustus','Spartacus','Maximus','Aurelius','Trajan','Hadrian','Titus','Scipio','Cato','Pompey','Crassus','Sulla','Marius'];
  return names[i%names.length];
}

function getSpawnPositions(np,gs){
  const positions=[];
  const margin=1;
  const available=[];
  for(let r=margin;r<gs-margin;r++)
    for(let c=margin;c<gs-margin;c++)
      available.push([r,c]);
  let idx=Math.floor(Math.random()*available.length);
  positions.push(available.splice(idx,1)[0]);
  for(let i=1;i<np&&available.length;i++){
    let bestDist=-1, bestIdx=0;
    for(let j=0;j<available.length;j++){
      let minD=Infinity;
      for(const p of positions){
        const d=Math.abs(available[j][0]-p[0])+Math.abs(available[j][1]-p[1]);
        minD=Math.min(minD,d);
      }
      if(minD>bestDist){bestDist=minD;bestIdx=j;}
    }
    positions.push(available.splice(bestIdx,1)[0]);
  }
  return positions;
}

function getPlayerTerritories(pid){
  const t=[];
  for(let r=0;r<G.size;r++)for(let c=0;c<G.size;c++)
    if(G.grid[r][c].owner===pid) t.push(G.grid[r][c]);
  return t;
}

function neighbors(r,c){
  const n=[];
  if(r>0)n.push(G.grid[r-1][c]);
  if(r<G.size-1)n.push(G.grid[r+1][c]);
  if(c>0)n.push(G.grid[r][c-1]);
  if(c<G.size-1)n.push(G.grid[r][c+1]);
  return n;
}

// ---- INCOME & GENERATION ----
function tickEconomy(dt){
  for(const p of G.players){
    if(!p.alive)continue;
    const terrCount=getPlayerTerritories(p.id).length;
    p.goldRate = BASE_GOLD + terrCount * 8;
    p.troopRate = BASE_TROOP + terrCount * 0.3;
    p.gold += p.goldRate * dt;
    p.troops += p.troopRate * dt;
    // FIXED: Player dies only when ALL lands are conquered (0 territories)
    // Troops alone don't kill you — only losing all territory does
    if(terrCount===0){
      p.alive=false;
      if(p.id===meIdx){ showGameOver(false); }
    }
  }
}

// ---- COMBAT ----
function doBattle(atkPid, defCell, atkTroops){
  const atkP=G.players[atkPid];
  if(!atkP) return false;
  const defP=(defCell.owner>=0 && defCell.owner<G.players.length) ? G.players[defCell.owner] : null;
  const defTroops=Math.floor(defCell.troops)||0;
  const atkMult=atkP.powerMult||1;
  const defMult=defP?(defP.powerMult||1):1;
  const atkPower=atkTroops * atkMult;
  const defPower=defTroops * defMult;
  
  // Higher POWER wins. Period.
  if(atkPower >= defPower){
    // Winner: attacker. Leftover power converted back to troops.
    const leftoverPower=atkPower - defPower;
    const remainingTroops=Math.max(1, Math.floor(leftoverPower / atkMult));
    defCell.troops = remainingTroops;
    defCell.owner = atkPid;
    defCell.flagHP = 0;
    spawnParticles(defCell.col*CELL+CELL/2, defCell.row*CELL+CELL/2, atkP.color, 12);
    addFloat(defCell.col*CELL+CELL/2, defCell.row*CELL+CELL/2,
      'CAPTURED! ⚔'+Math.floor(atkPower)+' vs ⚔'+Math.floor(defPower), atkP.color);
    if(isOnline && atkPid===meIdx){
      fbRef.child('grid/'+defCell.row+'_'+defCell.col).set({owner:fbMyId, troops:remainingTroops});
    }
    return true;
  } else {
    // Winner: defender. Leftover power converted back to defender troops.
    const leftoverPower=defPower - atkPower;
    const remainingTroops=Math.max(1, Math.floor(leftoverPower / defMult));
    defCell.troops = remainingTroops;
    addFloat(defCell.col*CELL+CELL/2, defCell.row*CELL+CELL/2,
      'REPELLED ⚔'+Math.floor(atkPower)+' vs ⚔'+Math.floor(defPower), '#f44');
    return false;
  }
}

// ---- BOT AI ----
function tickBots(dt){
  for(const p of G.players){
    if(!p.isBot || !p.alive) continue;
    p.botTimer-=dt;
    if(p.botTimer>0) continue;
    p.botTimer=1.5+Math.random()*2;

    const myTerr=getPlayerTerritories(p.id);
    if(myTerr.length===0){
      continue;
    }

    const roll=Math.random();
    if(roll<0.3 && p.troops>=3){
      const weakest=myTerr.reduce((a,b)=>a.troops<b.troops?a:b);
      const amt=Math.min(Math.floor(p.troops*0.5), Math.floor(p.troops));
      if(amt>=1){
        weakest.troops+=amt;
        p.troops-=amt;
      }
    } else if(roll<0.7){
      let bestTarget=null, bestScore=-1;
      for(const t of myTerr){
        for(const nb of neighbors(t.row,t.col)){
          if(nb.owner!==p.id){
            const score=(t.troops - nb.troops)*2 + Math.random()*5;
            if(score>bestScore && t.troops>2){bestScore=score;bestTarget={from:t,to:nb};}
          }
        }
      }
      if(bestTarget && bestTarget.from.troops>2){
        const sendAmt=Math.floor(bestTarget.from.troops*0.6);
        bestTarget.from.troops-=sendAmt;
        doBattle(p.id, bestTarget.to, sendAmt);
      }
    } else {
      const frontLine=myTerr.filter(t=>neighbors(t.row,t.col).some(n=>n.owner!==p.id));
      const backLine=myTerr.filter(t=>!frontLine.includes(t)&&t.troops>2);
      if(backLine.length && frontLine.length){
        const src=backLine[Math.floor(Math.random()*backLine.length)];
        const dst=frontLine[Math.floor(Math.random()*frontLine.length)];
        const amt=Math.floor(src.troops*0.5);
        if(amt>=1){src.troops-=amt;dst.troops+=amt;}
      }
    }

    // Bot upgrades: try to buy cheapest available upgrade
    const upKeys=['gold','troops','power'];
    let bestUp=null, bestCost=Infinity;
    for(const uk of upKeys){
      const lv=p.upgradeLv[uk];
      const def=UPGRADES[uk];
      if(lv<def.levels.length){
        const cost=def.levels[lv].cost;
        if(p.gold>=cost && cost<bestCost){bestCost=cost;bestUp=uk;}
      }
    }
    if(bestUp){
      const lv=p.upgradeLv[bestUp];
      const lvData=UPGRADES[bestUp].levels[lv];
      p.gold-=lvData.cost;
      p.upgradeLv[bestUp]++;
      if(bestUp==='gold') p.goldRate+=lvData.add;
      else if(bestUp==='troops') p.troopRate+=lvData.add;
      else if(bestUp==='power') p.powerMult=lvData.mult;
    }
  }
}

// ---- PARTICLES ----
function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:(Math.random()-.5)*120,vy:(Math.random()-.5)*120,life:1,color});
  }
}
function addFloat(x,y,text,color){
  floatingTexts.push({x,y,text,color,life:2});
}
function tickParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=floatingTexts.length-1;i>=0;i--){
    const f=floatingTexts[i];
    f.y-=30*dt;f.life-=dt;
    if(f.life<=0)floatingTexts.splice(i,1);
  }
}

// ---- CAPTURE MECHANIC ----
function tickCapture(dt){
  if(!keys['u']&&!keys['U']){capProg=0;capTarget=null;document.getElementById('capbar').style.display='none';return;}
  const cx=cam.x+W/2, cy=cam.y+H/2;
  const col=Math.floor(cx/CELL), row=Math.floor(cy/CELL);
  if(row<0||row>=G.size||col<0||col>=G.size){capProg=0;return;}
  const cell=G.grid[row][col];
  if(cell.owner===meIdx){capProg=0;document.getElementById('capbar').style.display='none';return;}
  if(cell.troops>0){
    toast('Clear defenders first!');capProg=0;document.getElementById('capbar').style.display='none';return;
  }
  const adj=neighbors(row,col);
  if(!adj.some(n=>n.owner===meIdx)){capProg=0;document.getElementById('capbar').style.display='none';return;}

  if(capTarget!==cell){capProg=0;capTarget=cell;}
  capProg+=dt;
  document.getElementById('capbar').style.display='block';
  document.getElementById('capfill').style.width=(capProg/CAP_TIME*100)+'%';
  document.getElementById('captxt').textContent=`CAPTURING ${Math.floor(capProg)}/${CAP_TIME}s`;
  if(capProg>=CAP_TIME){
    cell.owner=meIdx;
    cell.troops=0;
    cell.flagHP=0;
    capProg=0;capTarget=null;
    document.getElementById('capbar').style.display='none';
    toast('Territory captured!');
    spawnParticles(col*CELL+CELL/2,row*CELL+CELL/2,me.color,20);
    // Sync to Firebase
    if(isOnline){
      fbRef.child('grid/'+row+'_'+col).set({owner:fbMyId, troops:0});
    }
  }
}

// ---- DRAWING ----
function draw(){
  ctx.fillStyle='#0a0a0f';
  ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.translate(-cam.x,-cam.y);

  for(let r=0;r<G.size;r++){
    for(let c=0;c<G.size;c++){
      const cell=G.grid[r][c];
      const x=c*CELL, y=r*CELL;

      if(cell.owner>=0){
        const p=G.players[cell.owner];
        ctx.fillStyle=p.color+'33';
        ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
        ctx.strokeStyle=p.color+'88';
        ctx.lineWidth=2;
        ctx.strokeRect(x+1,y+1,CELL-2,CELL-2);
      } else {
        ctx.fillStyle='#12111a';
        ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
        ctx.strokeStyle='#1e1d2a';
        ctx.lineWidth=1;
        ctx.strokeRect(x+1,y+1,CELL-2,CELL-2);
      }

      if(cell.owner>=0){
        ctx.fillStyle=G.players[cell.owner].color;
        ctx.beginPath();
        ctx.arc(x+CELL/2,y+CELL/2,6,0,Math.PI*2);
        ctx.fill();
        ctx.strokeStyle=G.players[cell.owner].color;
        ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(x+CELL/2,y+CELL/2);ctx.lineTo(x+CELL/2,y+CELL/2-16);ctx.stroke();
        ctx.fillStyle=G.players[cell.owner].color+'cc';
        ctx.fillRect(x+CELL/2,y+CELL/2-16,12,8);
      }

      if(cell.troops>0){
        const owner=(cell.owner>=0&&cell.owner<G.players.length)?G.players[cell.owner]:null;
        const mult=owner?owner.powerMult||1:1;
        const effectivePower=Math.floor(cell.troops * mult);
        ctx.fillStyle='#fff';
        ctx.font='bold 11px "JetBrains Mono"';
        ctx.textAlign='center';
        ctx.fillText(Math.floor(cell.troops),x+CELL/2,y+CELL-8);
        // Always show effective power
        ctx.fillStyle=mult>1?'#d4af37':'#8a8a9a';
        ctx.font='bold 9px "JetBrains Mono"';
        ctx.fillText('⚔'+effectivePower+' (×'+mult+')',x+CELL/2,y+CELL-20);
      }

      ctx.fillStyle='#2a2a3a';
      ctx.font='8px "JetBrains Mono"';
      ctx.textAlign='left';
      ctx.fillText(`${r},${c}`,x+3,y+10);
    }
  }

  if(selTerr){
    ctx.strokeStyle='#fff';
    ctx.lineWidth=3;
    ctx.setLineDash([5,5]);
    ctx.strokeRect(selTerr.col*CELL,selTerr.row*CELL,CELL,CELL);
    ctx.setLineDash([]);
  }

  if(action && selTerr){
    const nbs = action==='move'
      ? getPlayerTerritories(meIdx).filter(t=>t!==selTerr)
      : action==='attack'
        ? neighbors(selTerr.row,selTerr.col).filter(n=>n.owner!==meIdx)
        : [];
    for(const t of nbs){
      ctx.strokeStyle=action==='attack'?'#f44a':'#4f4a';
      ctx.lineWidth=2;
      ctx.setLineDash([4,4]);
      ctx.strokeRect(t.col*CELL,t.row*CELL,CELL,CELL);
      ctx.setLineDash([]);
    }
  }

  const cx=cam.x+W/2, cy=cam.y+H/2;
  ctx.strokeStyle='#d4af3766';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-12,cy);ctx.lineTo(cx+12,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-12);ctx.lineTo(cx,cy+12);ctx.stroke();

  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;

  for(const f of floatingTexts){
    ctx.globalAlpha=Math.min(1,f.life);
    ctx.fillStyle=f.color;
    ctx.font='bold 13px "Cinzel"';
    ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;

  ctx.restore();
  drawMinimap();
}

function drawMinimap(){
  const mmS=160;
  const cs=mmS/G.size;
  mmCtx.fillStyle='#0a0a0f';
  mmCtx.fillRect(0,0,mmS,mmS);
  for(let r=0;r<G.size;r++){
    for(let c=0;c<G.size;c++){
      const cell=G.grid[r][c];
      if(cell.owner>=0){
        mmCtx.fillStyle=G.players[cell.owner].color;
      } else {
        mmCtx.fillStyle='#1a1a2a';
      }
      mmCtx.fillRect(c*cs,r*cs,cs-0.5,cs-0.5);
    }
  }
  const vx=(cam.x/(G.size*CELL))*mmS;
  const vy=(cam.y/(G.size*CELL))*mmS;
  const vw=(W/(G.size*CELL))*mmS;
  const vh=(H/(G.size*CELL))*mmS;
  mmCtx.strokeStyle='#d4af37';
  mmCtx.lineWidth=1.5;
  mmCtx.strokeRect(vx,vy,vw,vh);
}

// ---- HUD UPDATE ----
let lastShopState='';
function updateHUD(){
  if(!me)return;
  document.getElementById('hgold').textContent=formatNum(Math.floor(me.gold));
  document.getElementById('htroops').textContent=Math.floor(me.troops);
  document.getElementById('htier').textContent='×'+me.powerMult;
  document.getElementById('hland').textContent=getPlayerTerritories(meIdx).length;
  document.getElementById('hnukes').textContent=me.nukes||0;
  document.getElementById('hincome').textContent='+'+Math.floor(me.goldRate);
  document.getElementById('htgen').textContent='+'+me.troopRate.toFixed(1);
  updateLeaderboard();
  // Only rebuild shop when upgrade state changes
  const shopState=me.upgradeLv.gold+'-'+me.upgradeLv.troops+'-'+me.upgradeLv.power+'-'+me.upgradeLv.nuke+'-'+Math.floor(me.gold/100);
  if(shopState!==lastShopState){
    lastShopState=shopState;
    updateShop();
  }
}

function formatNum(n){
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return n;
}

function updateLeaderboard(){
  const sorted=[...G.players].filter(p=>p.alive).sort((a,b)=>getPlayerTerritories(b.id).length-getPlayerTerritories(a.id).length);
  const el=document.getElementById('lbl');
  el.innerHTML=sorted.slice(0,8).map(p=>{
    const tc=getPlayerTerritories(p.id).length;
    const isMe=p.id===meIdx;
    return `<div class="lbr" style="${isMe?'background:rgba(212,175,55,.08)':''}">
      <span class="n" style="color:${p.color}">${p.name}</span>
      <span class="c">${tc}</span>
    </div>`;
  }).join('');
}

function updateShop(){
  const el=document.getElementById('shoplist');
  el.innerHTML='';
  const cats=['gold','troops','power','nuke'];
  for(const cat of cats){
    const def=UPGRADES[cat];
    const lv=me.upgradeLv[cat];
    const div=document.createElement('div');
    div.className='si';
    if(lv>=def.levels.length){
      div.classList.add('owned');
      div.innerHTML=`<div class="sn">${def.name}</div>
        <div class="sc">MAX</div>
        <div class="sd">Fully upgraded</div>`;
    } else {
      const lvData=def.levels[lv];
      const canBuy=me.gold>=lvData.cost;
      const extra=cat==='nuke'?' (Have: '+(me.nukes||0)+')':'';
      div.innerHTML=`<div class="sn">${def.name}${cat==='nuke'?'':' Lv'+(lv+1)}</div>
        <div class="sc">${formatNum(lvData.cost)} gold${extra}</div>
        <div class="sd">${lvData.name}</div>`;
      if(canBuy){
        div.style.cursor='pointer';
        div.onclick=(function(category,level){
          return function(){
            const lvD=UPGRADES[category].levels[level];
            if(me.gold<lvD.cost)return;
            me.gold-=lvD.cost;
            me.upgradeLv[category]++;
            if(category==='gold') me.goldRate+=lvD.add;
            else if(category==='troops') me.troopRate+=lvD.add;
            else if(category==='power') me.powerMult=lvD.mult;
            else if(category==='nuke'){ me.nukes=(me.nukes||0)+lvD.add; }
            toast(category==='nuke'?'Nuke acquired! ('+me.nukes+' total)':'Upgraded '+UPGRADES[category].name+'!');
            lastShopState='';
            updateShop();
          };
        })(cat,lv);
      } else {
        div.style.opacity='0.5';
        div.style.cursor='default';
      }
    }
    el.appendChild(div);
  }
}

// ---- CHEAT CODE ----
let cheatSeqTroops=[];
let cheatSeqGold=[];
const CHEAT_TROOPS=['f','5','5','2','2'];
const CHEAT_GOLD=['g','5','5','2','2'];

function checkCheatCode(key){
  // Troop cheat: f5522
  cheatSeqTroops.push(key);
  if(cheatSeqTroops.length>5) cheatSeqTroops.shift();
  if(cheatSeqTroops.length===5 && cheatSeqTroops.every((k,i)=>k===CHEAT_TROOPS[i])){
    cheatSeqTroops=[];
    const amt=prompt('Enter troop amount:');
    const num=parseInt(amt);
    if(!num||num<1)return;
    me.troops+=num;
    toast('+'+num+' troops');
  }
  // Gold cheat: g5522
  cheatSeqGold.push(key);
  if(cheatSeqGold.length>5) cheatSeqGold.shift();
  if(cheatSeqGold.length===5 && cheatSeqGold.every((k,i)=>k===CHEAT_GOLD[i])){
    cheatSeqGold=[];
    const amt=prompt('Enter gold amount:');
    const num=parseInt(amt);
    if(!num||num<1)return;
    me.gold+=num;
    toast('+'+formatNum(num)+' gold');
  }
}

// ---- INPUT ----
document.addEventListener('keydown',e=>{
  // Don't capture movement keys when typing in an input
  const inInput=document.activeElement&&document.activeElement.tagName==='INPUT';
  const k=e.key.toLowerCase();
  
  // If arrow key pressed while in input, blur the input so movement works
  if(inInput && ['arrowup','arrowdown','arrowleft','arrowright'].includes(k)){
    document.activeElement.blur();
  }
  // If typing W/A/S/D in an input, don't treat as movement
  if(inInput && !['arrowup','arrowdown','arrowleft','arrowright'].includes(k)){
    return;
  }
  
  // Track cheat code input
  if(!inInput && gameOn){
    checkCheatCode(k);
  }
  
  keys[k]=true;
  // Prevent arrow keys from scrolling the page
  if(['arrowup','arrowdown','arrowleft','arrowright'].includes(k)){
    e.preventDefault();
  }
  if(!gameOn)return;
  if(e.key==='1')setAction('deploy');
  if(e.key==='2')setAction('move');
  if(e.key==='3')setAction('attack');
  if(e.key==='4')toggleShop();
  if(e.key==='5')setAction('nuke');
  if(e.key==='Escape'){action=null;selTerr=null;selTerr2=null;
    document.querySelectorAll('.ab').forEach(b=>b.classList.remove('on'));
    document.getElementById('tinput').style.display='none';
    document.getElementById('shop').style.display='none';shopOpen=false;
  }
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
// Clear all keys when leaving the tab so camera doesn't drift
window.addEventListener('blur',()=>{for(const k in keys)keys[k]=false;});
document.addEventListener('visibilitychange',()=>{if(document.hidden)for(const k in keys)keys[k]=false;});

document.querySelectorAll('.ab').forEach(b=>{
  b.onclick=()=>{ const a=b.dataset.a; if(a==='shop')toggleShop(); else setAction(a); };
});

function setAction(a){
  if(action===a){action=null;selTerr=null;}
  else{action=a;selTerr=null;selTerr2=null;}
  document.querySelectorAll('.ab').forEach(b=>b.classList.toggle('on',b.dataset.a===action));
  document.getElementById('tinput').style.display=(action==='deploy'||action==='move'||action==='attack')?'block':'none';
  document.getElementById('shop').style.display='none';shopOpen=false;
  if(action==='nuke') toast('☢ NUKE MODE — Click enemy territory ('+(me.nukes||0)+' nukes)');
}

function toggleShop(){
  shopOpen=!shopOpen;
  document.getElementById('shop').style.display=shopOpen?'block':'none';
  if(shopOpen){action=null;selTerr=null;document.querySelectorAll('.ab').forEach(b=>b.classList.toggle('on',b.dataset.a==='shop'));}
}

// Mouse click on canvas
document.getElementById('gc').addEventListener('click',e=>{
  if(!gameOn)return;
  const mx=e.clientX+cam.x, my=e.clientY+cam.y;
  const col=Math.floor(mx/CELL), row=Math.floor(my/CELL);
  if(row<0||row>=G.size||col<0||col>=G.size)return;
  const cell=G.grid[row][col];
  const troopAmt=parseInt(document.getElementById('tcnt').value)||10;

  if(action==='deploy'){
    if(cell.owner===meIdx){
      const amt=Math.min(troopAmt,Math.floor(me.troops));
      if(amt<1){toast('No troops!');return;}
      cell.troops+=amt;
      me.troops-=amt;
      toast(`Deployed ${amt} troops`);
      spawnParticles(col*CELL+CELL/2,row*CELL+CELL/2,me.color,6);
    } else { toast('Select YOUR territory'); }
  }
  else if(action==='move'){
    if(!selTerr){
      if(cell.owner!==meIdx){toast('Select YOUR territory first');return;}
      selTerr=cell;
      toast('Now click destination territory');
    } else {
      if(cell.owner!==meIdx){toast('Can only move to YOUR territory');selTerr=null;return;}
      if(cell===selTerr){selTerr=null;return;}
      const amt=Math.min(troopAmt,Math.floor(selTerr.troops));
      if(amt<1){toast('No troops to move');selTerr=null;return;}
      selTerr.troops-=amt;
      cell.troops+=amt;
      toast(`Moved ${amt} troops`);
      selTerr=null;
    }
  }
  else if(action==='attack'){
    if(!selTerr){
      if(cell.owner!==meIdx){toast('Select YOUR territory to attack from');return;}
      if(cell.troops<1){toast('No troops here');return;}
      selTerr=cell;
      toast('Now click enemy neighbor to attack (sending '+troopAmt+' troops)');
    } else {
      if(cell.owner===meIdx){toast('That\'s your territory!');selTerr=null;return;}
      const adj=neighbors(selTerr.row,selTerr.col);
      if(!adj.includes(cell)){toast('Must attack adjacent territory');selTerr=null;return;}
      const amt=Math.min(troopAmt,Math.floor(selTerr.troops));
      if(amt<1){toast('No troops');selTerr=null;return;}
      toast('Attacking with '+amt+' troops...');
      selTerr.troops-=amt;
      doBattle(meIdx, cell, amt);
      selTerr=null;
    }
  }
  else if(action==='nuke'){
    if(!me.nukes||me.nukes<1){toast('No nukes! Buy from shop [4]');return;}
    if(cell.owner===meIdx){toast('Can\'t nuke your own territory!');return;}
    // NUKE: destroy target tile + all adjacent tiles (wipe troops, set to neutral)
    me.nukes--;
    const nukedCells=[cell];
    const adj=neighbors(row,col);
    for(const nb of adj){
      if(nb.owner!==meIdx) nukedCells.push(nb); // don't nuke own tiles
    }
    for(const nc of nukedCells){
      nc.troops=0;
      nc.owner=-1;
      nc.flagHP=0;
      spawnParticles(nc.col*CELL+CELL/2,nc.row*CELL+CELL/2,'#ff4400',25);
      addFloat(nc.col*CELL+CELL/2,nc.row*CELL+CELL/2,'☢ NUKED','#ff4400');
      if(isOnline){
        fbRef.child('grid/'+nc.row+'_'+nc.col).remove();
      }
    }
    toast('☢ NUCLEAR STRIKE! '+nukedCells.length+' tiles destroyed!');
    action=null;
    document.querySelectorAll('.ab').forEach(b=>b.classList.remove('on'));
  }
});

// ---- TOAST ----
let toastTimer=null;
function toast(msg){
  const old=document.querySelector('.toast');
  if(old)old.remove();
  const d=document.createElement('div');
  d.className='toast';d.textContent=msg;
  document.body.appendChild(d);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>d.remove(),3000);
}

// ---- GAME OVER ----
function showGameOver(won){
  gameOn=false;
  document.getElementById('gameover').style.display='flex';
  document.getElementById('gotext').textContent=won?'VICTORY':'DEFEAT';
  document.getElementById('gosub').textContent=won?'You have conquered all territories!':'Your empire has fallen.';
}

function checkVictory(){
  // In online mode, no auto-victory (it's persistent)
  if(isOnline)return;
  // Need at least 2 players total for victory/defeat to matter
  if(G.players.length<2)return;
  const alive=G.players.filter(p=>p.alive);
  if(alive.length===1){
    if(alive[0].id===meIdx) showGameOver(true);
    else showGameOver(false);
  }
  const withTerr=G.players.filter(p=>getPlayerTerritories(p.id).length>0);
  if(withTerr.length===1 && withTerr[0].id===meIdx) showGameOver(true);
}

// ---- CAMERA MOVEMENT ----
function tickCamera(dt){
  const spd=300;
  if(keys['w']||keys['arrowup'])cam.y-=spd*dt;
  if(keys['s']||keys['arrowdown'])cam.y+=spd*dt;
  if(keys['a']||keys['arrowleft'])cam.x-=spd*dt;
  if(keys['d']||keys['arrowright'])cam.x+=spd*dt;
  // Allow full free movement but soft-clamp so you can't go too far past grid
  const worldW=G.size*CELL, worldH=G.size*CELL;
  const pad=200; // allow 200px past grid edges
  cam.x=Math.max(-W+pad, Math.min(cam.x, worldW-pad));
  cam.y=Math.max(-H+pad, Math.min(cam.y, worldH-pad));
}

// ---- MAIN LOOP ----
function loop(ts){
  if(!gameOn){requestAnimationFrame(loop);return;}
  const dt=Math.min((ts-lastT)/1000, 0.1);
  lastT=ts;

  tickCamera(dt);
  tickEconomy(dt);
  tickBots(dt);
  tickCapture(dt);
  tickParticles(dt);
  draw();
  updateHUD();
  checkVictory();

  requestAnimationFrame(loop);
}

// ---- INIT CANVAS ----
function initCanvas(){
  canvas=document.getElementById('gc');
  ctx=canvas.getContext('2d');
  mmCanvas=document.getElementById('mm');
  mmCtx=mmCanvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
}
function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
}

// Boot
initCanvas();
</script>
